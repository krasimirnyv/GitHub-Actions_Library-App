name: Build, Test and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_test:

    runs-on: ubuntu-latest
        
    steps:
    - name: Checkout the repository
      uses: actions/checkout@v6
      
    - name: Use Node.js 22
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Install npm Dependencies
      run: npm install
      
    - name: Manualy change the config.js file
      run: echo "export const settings = { host:'http://localhost:3030' };" > src/config.js
       
    - name: Run Back-End
      run: npm run server &
      
    - name: Run Front-End
      run: npm run start &

    - name: Install Playwright Browsers
      run: npx playwright install

    - name: Run Tests
      run: npm run test
      
  deploy-be:
    needs: build_test
    
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Back-End to production
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.SERVICE_BE_ID }}
          api_key: ${{ secrets.API_KEY }}
          wait_deploy: true

  deploy-fe:
    needs: deploy-be
    
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Front-End to production
        uses: JorgeLNJunior/render-deploy@v1.5.0
        with:
          service_id: ${{ secrets.SERVICE_FE_ID }}
          api_key: ${{ secrets.API_KEY }}
          wait_deploy: true